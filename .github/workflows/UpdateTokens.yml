name: Update Tokens

on:
  schedule:
    - cron: '0 * * * *' # ירוץ אוטומטית בכל שעה עגולה
  workflow_dispatch: # מאפשר הרצה ידנית בלחיצת כפתור

jobs:
  update-token:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Token and Update CSV
        env:
          # הגדרת משתנה סביבה כדי שפייתון יוכל לגשת אליו בבטחה
          TICKET_ENV: ""
        run: |
          # 1. שליפת הטוקן ממאקו
          RESPONSE=$(curl -s \
            -H "User-Agent: Mozilla/5.0" \
            -H "Referer: https://www.mako.co.il/" \
            "https://mass.mako.co.il/ClicksStatistics/entitlementsServicesV2.jsp?et=gt&lp=/i/24live_1@195271/master.m3u8?b=200-2500&rv=AKAMAI")
          
          TICKET=$(echo "$RESPONSE" | jq -r '.tickets[0].ticket // empty')
          
          if [ -z "$TICKET" ] || [ "$TICKET" == "null" ]; then
            echo "Error: Failed to retrieve ticket. Response: $RESPONSE"
            exit 1
          fi
          
          # ייצוא הטוקן למשתנה הסביבה של השלב
          export TICKET_ENV="$TICKET"
          
          # 2. עדכון קובץ ה-CSV באמצעות פייתון
          python3 -c "
          import csv
          import os
          
          file_path = 'channels.csv'
          rows = []
          fieldnames = []
          ticket = os.environ.get('TICKET_ENV', '')
          
          # קריאה בטוחה ושמירה על המבנה המקורי
          with open(file_path, 'r', encoding='utf-8-sig') as f:
              reader = csv.DictReader(f)
              fieldnames = reader.fieldnames
              for row in reader:
                  if row.get('id') == 'ch24':
                      row['url'] = f'https://mako-streaming.akamaized.net/direct/hls/live/2035340/ch24live/index.m3u8?{ticket}'
                  rows.append(row)
          
          # כתיבה נקייה מחדש עם העמודות המקוריות
          with open(file_path, 'w', newline='', encoding='utf-8') as f:
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()
              writer.writerows(rows)
          "
          echo "CSV updated successfully without affecting other channels!"

      - name: Commit & Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add channels.csv
          git commit -m "Auto update: updated Ch24 stream token" || exit 0
          git push
