name: Update Tokens

on:
  schedule:
    - cron: '0 4 * * *' # ירוץ אוטומטית פעם ביום ב-4 לפנות בוקר (UTC)
  workflow_dispatch: # מאפשר לך להריץ את העדכון גם ידנית מתי שתרצה בלחיצת כפתור ב-GitHub

jobs:
  update-token:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Token and Update CSV
        run: |
          # 1. שליפת הג'ייסון משרת הזכאויות של מאקו וחילוץ שדה ה-ticket באמצעות jq
          TICKET=$(curl -s -A "Mozilla/5.0" "https://mass.mako.co.il/ClicksStatistics/entitlementsServicesV2.jsp?et=gt&lp=/i/24live_1@195271/master.m3u8?b=200-2500&rv=AKAMAI" | jq -r '.ticket')
          
          # בדיקה שהטוקן אכן התקבל ולא ריק
          if [ -z "$TICKET" ] || [ "$TICKET" == "null" ]; then
            echo "Error: Failed to retrieve ticket from Mako!"
            exit 1
          fi
          
          # 2. הרכבת ה-URL המלא של הסטרים
          NEW_URL="https://mako-streaming.akamaized.net/direct/hls/live/2035340/ch24live/index.m3u8?$TICKET"
          
          # 3. החלפת ה-URL של ערוץ 24 בתוך קובץ ה-CSV (מזהה ch24)
          # פקודה זו מחפשת שורה שמתחילה ב-ch24, ושומרת על שם הערוץ והמדינה, ורק מעדכנת את ה-URL
          sed -i -E "s|^(ch24,[^,]*),[^,]*(,.*)|\1,$NEW_URL\2|" channels.csv
          
          echo "CSV updated successfully with new token."

      - name: Commit & Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add channels.csv
          # אם לא חל שינוי בטוקן מאז הפעם האחרונה, הסקריפט לא ייכשל אלא פשוט יסיים בשלום
          git commit -m "Auto update: updated Ch24 stream token" || exit 0
          git push
