- name: Update Tokens
        run: |
          # 1. שליפת הטוקן ממאקו
          RESPONSE=$(curl -s \
            -H "User-Agent: Mozilla/5.0" \
            -H "Referer: https://www.mako.co.il/" \
            "https://mass.mako.co.il/ClicksStatistics/entitlementsServicesV2.jsp?et=gt&lp=/i/24live_1@195271/master.m3u8?b=200-2500&rv=AKAMAI")
          
          TICKET=$(echo "$RESPONSE" | jq -r '.tickets[0].ticket // empty')
          
          if [ -z "$TICKET" ] || [ "$TICKET" == "null" ]; then
            echo "Error: Failed to retrieve ticket. Response: $RESPONSE"
            exit 1
          fi
          
          # 2. עדכון קובץ ה-CSV באמצעות פייתון בצורה בטוחה
          python3 -c "
          import csv
          
          file_path = 'channels.csv'
          rows = []
          fieldnames = []
          
          # קריאה בטוחה ושמירה על המבנה המקורי של העמודות והשורות
          with open(file_path, 'r', encoding='utf-8-sig') as f:
              reader = csv.DictReader(f)
              fieldnames = reader.fieldnames
              for row in reader:
                  # עדכון אך ורק של כתובת ה-url בערוץ 24
                  if row.get('id') == 'ch24':
                      row['url'] = f'https://mako-streaming.akamaized.net/direct/hls/live/2035340/ch24live/index.m3u8?{TICKET}'
                  # הוספת השורה (בין אם שונתה ובין אם לא) כשהיא שומרת על טיפוס המילון המקורי
                  rows.append(row)
          
          # כתיבה נקייה מחדש עם העמודות המקוריות
          with open(file_path, 'w', newline='', encoding='utf-8') as f:
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()
              writer.writerows(rows)
          "
          echo "CSV updated successfully without affecting other channels!"
