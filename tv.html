<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8"><meta name="theme-color" content="#1565C0" /><title>Split TV</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/gridstack@12.6.0/dist/gridstack.min.css">
    <style>
        :root { --color:#1565C0; }
        @font-face { font-family:'Glitch'; src:url('https://fonts.gstatic.com/s/rubikglitch/v2/qkBSXv8b_srFRYQVYrDKh9ZfnSTGCNg.woff2'); }
        body, .grid-stack-item-content { margin:0!important; overflow:hidden!important; color:#FFF; font-family:"Arial"; text-align:center; }
        video { width:100%; height:calc(100% - 4.5vh); object-fit:fill; }
        .nav { background:var(--color); display:grid; place-items:center; padding:.5rem; font-size:2rem; font-family:"Glitch"; }
        .selector { background:#F9F9F9; display:flex; flex-wrap:wrap; gap:.5rem; padding:.5rem; }
        .btn { display:inline-flex; align-items:center; border:none; cursor:pointer; height:2rem; padding:1rem; border-radius:1rem; transition:background .2s, transform .1s; }
        .btn:hover { background:var(--color); } .btn:active { transform:scale(0.9); }
        .grid-stack { height:calc(100vh - 12vh); margin:1vh; }
        .grid-stack-item-content, .placeholder-content { background:#666; border-radius:1vw; } .placeholder-content { opacity:0.25; }
        .handle { display:flex; justify-content:center; align-items:center; position:relative; cursor:move; padding:1vh; opacity:.5; } .handle:hover { opacity:1; } .handle a { position:absolute; cursor:pointer; left:1vh; }
        .ui-resizable-se, .ui-resizable-sw { bottom:4px!important; background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg"><path fill="%23FFF" d="M9 3h2L8 0 5 3h2v10H5l3 3 3-3H9"/></svg>')!important; }
    </style>
</head>

<body>
    <div class="nav">המסך המפוצל</div><div class="selector"></div><div class="grid-stack"></div>
    <script src="//code.jquery.com/jquery-4.0.0.slim.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/gridstack@12.6.0/dist/gridstack-all.js"></script>
    <script src="//cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        GridStack.renderCB=(el,w)=>el.innerHTML=w.content||'';
        let grid=GridStack.init({rtl:true,maxRow:8,cellHeight:'auto',margin:'0.25vh',draggable:{handle:'.handle'},resizable:{handles:'s,e,w,se,sw'},alwaysShowResizeHandle:/Android|iPhone|iPad/i.test(navigator.userAgent)});
        let c=location.search.slice(1).toLowerCase(),hs={},open={};
        fetch('channels.csv').then(r=>r.text()).then(t=>{
            let [h,...r]=t.split('\n'),k=h.split(',');
            r.map(x=>Object.fromEntries(x.split(',').map((v,i)=>[k[i],v]))).filter(x=>x.name&&x.url&&(!c||x.country.toLowerCase()==c)).forEach(x=>$(`<button class="btn">${x.name}</button>`).on('click',()=>{
            if(open[x.id])return; open[x.id]=1;
            grid.addWidget({w:4,h:4,content:`<div class="handle">${x.name}<a data-id="${x.id}" onclick="hs[this.dataset.id]?.destroy();delete hs[this.dataset.id];delete open[this.dataset.id];grid.removeWidget(this.closest('.grid-stack-item'))">⮾</a></div><video id="v${x.id}" controls autoplay muted playsinline></video>`});
            let v=$(`#v${x.id}`)[0]; if(Hls.isSupported()){hs[x.id]=new Hls;hs[x.id].loadSource(x.url);hs[x.id].attachMedia(v)}else v.src=x.url
        }).appendTo('.selector'))
    });
    onresize=()=>grid.cellHeight(matchMedia("(orientation: portrait)").matches?'5.5vh':'11.5vh');
    onresize();
</script>
</body>

</html>
