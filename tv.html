<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="theme-color" content="#1565C0" /><title>Split TV</title>
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/gridstack@8.0.0/dist/gridstack.min.css">
    <style>a{float:left;color:white;cursor:pointer}.channel-selector{padding:10px;background:#e0e0e0;display:flex;gap:10px;align-items:center;flex-wrap:wrap}.grid-stack{height:calc(100vh - 12vh)}video{width:100%;height:calc(100% - 5vh);object-fit:cover}</style>
</head>
<body>
    <nav class="blue darken-3"><div class="nav-wrapper container"><span class="brand-logo center">לשימוש אישי</span></div></nav>
    <div class="channel-selector" id="bar"><span>בחר ערוץ:</span></div>
    <div class="grid-stack"></div>
    <script src="//cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/gridstack@latest/dist/gridstack-jq.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        var grid = GridStack.init({maxRow:'8',cellHeight:'auto',margin:'0.25vh',draggable:{handle:'.handle'},resizable:{handles:'s,e,w,se,sw'},alwaysShowResizeHandle:/Android|iPhone|iPad/i.test(navigator.userAgent)}),
            c = window.location.search.replace('?','').trim().toLowerCase();
        Papa.parse('channels.csv',{download:true,header:true,complete:e=>{
            let d = c ? e.data.filter(x => x.country?.toLowerCase() === c) : e.data.filter(x => x.name && x.url);
            d.forEach(x => {if(x.name && x.url) $(`<button class="btn blue darken-2 waves-effect" style="font-size:0.8rem;padding:0 10px">${x.name}</button>`).on('click', () => grid.addWidget({w:4,h:4,content:`<div class="center handle">${x.name}<a onclick="grid.removeWidget(this.closest('.grid-stack-item'))">⮾</a></div><video playsinline autoplay controls muted src="${x.url}"></video>`})).appendTo('#bar')});
        }});
        onresize = () => grid.cellHeight(matchMedia("(orientation: portrait)").matches ? '5.5vh' : '11.5vh');
        onresize();
    </script>
</body>
</html>
