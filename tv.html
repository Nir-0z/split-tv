<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8"><meta name="theme-color" content="#1565C0" /><title>Split TV</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/gridstack@8.0.0/dist/gridstack.min.css">
    <style>
        body * { overflow:hidden!important; }
        a { float:left; color:white; cursor:pointer; }
        video { width:100%; height:calc(100% - 5vh); object-fit:fill; }
        .custom-nav { background: #1565C0; color: white; height: 56px; display: flex; align-items: center; justify-content: center; }
        .custom-logo { font-size: 1.2rem; font-weight: 500; }
        .channel-selector { padding: 10px; background: #e0e0e0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .custom-btn {
            background: #1976D2; color: #FFF; border: none; cursor: pointer;
            font-size: 0.8rem; padding: 0 10px; height: 32px; border-radius: 4px;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .custom-btn:hover { background: #1565C0; }
        .custom-btn:active { transform: scale(0.97); }
        .grid-stack { height:calc(100vh - 12vh); margin:1vh; }
        .grid-stack-item-content, .placeholder-content { background:#666; border-radius:1vw; } .placeholder-content { opacity:0.25; }
        .handle { cursor:move; color:#FFF; padding:1vh; opacity:0.5; display: flex; justify-content: space-between; align-items: center; } .handle:hover { opacity:1; }
        .ui-resizable-se, .ui-resizable-sw { bottom:4px!important; background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg"><path fill="%23FFF" d="M9 3h2L8 0 5 3h2v10H5l3 3 3-3H9"/></svg>')!important; }
    </style>
</head>

<body>
    <div class="custom-nav">לשימוש אישי</div>
    <div class="channel-selector" id="bar"><span>בחר ערוץ:</span></div>
    <div class="grid-stack"></div>
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/gridstack@latest/dist/gridstack-jq.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        var grid = GridStack.init({maxRow:'8',cellHeight:'auto',margin:'0.25vh',draggable:{handle:'.handle'},resizable:{handles:'s,e,w,se,sw'},alwaysShowResizeHandle:/Android|iPhone|iPad/i.test(navigator.userAgent)}),
            c = window.location.search.replace('?','').trim().toLowerCase();
        Papa.parse('https://raw.githubusercontent.com/Nir-0z/split-tv/refs/heads/master/channels.csv',{download:true,header:true,complete:e=>{
            let d = c ? e.data.filter(x => x.country?.toLowerCase() === c) : e.data.filter(x => x.name && x.url);
            d.forEach(x => {if(x.name && x.url) $(`<button class="custom-btn">${x.name}</button>`).on('click', () => grid.addWidget({w:4,h:4,content:`<div class="center handle">${x.name}<a onclick="grid.removeWidget(this.closest('.grid-stack-item'))">⮾</a></div><video playsinline autoplay controls muted src="${x.url}"></video>`})).appendTo('#bar')});
        }});
        onresize = () => grid.cellHeight(matchMedia("(orientation: portrait)").matches ? '5.5vh' : '11.5vh');
        onresize();
    </script>
</body>

</html>
